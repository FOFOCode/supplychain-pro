name: SupplyChain Pro - CI Build
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-services:
    runs-on: ubuntu-latest
    steps:
      # Obtener el codigo fuente
      - uses: actions/checkout@v4
      # Habilitar buildx para builds Docker
      - uses: docker/setup-buildx-action@v3
      - name: Construir imagen BACKEND
        run: docker build -t supplychainpro-backend ./backend
      - name: Construir imagen SIMULATOR
        run: docker build -t supplychainpro-simulator ./simulator
      - name: Construir imagen FRONTEND
        run: docker build -t supplychainpro-frontend ./frontend
      - name: Crear .env para CI desde .env.example (si existe)
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            echo "Creado .env desde .env.example"
          else
            echo "No se encontró .env.example - creando .env con valores por defecto seguros para CI"
            echo "DB_HOST=supplychainpro-db" > .env
            echo "DB_PORT=3306" >> .env
            echo "DB_NAME=supplychain_db" >> .env
            echo "DB_USER=supplychain_user" >> .env
            echo "DB_PASSWORD=supplychain_pass_12345" >> .env
            echo "DB_ROOT_PASSWORD=supplychain_root_pass_12345" >> .env
            echo "PORT=5000" >> .env
            echo "JWT_SECRET=ci_dummy_secret_change_me" >> .env
            echo "BACKEND_URL=http://supplychainpro-backend:5000" >> .env
            echo "NODE_ENV=production" >> .env
          fi
      - name: Validar docker-compose.yml
        run: docker compose config

name: SupplyChain Pro - CI Build

on:
  push: {}
  pull_request: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Test Backend
        working-directory: ./backend
        run: |
          npm install
          if npm run lint --silent; then echo "backend lint OK"; else echo "backend lint failed"; exit 1; fi
          npm test

      - name: Install & Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          # frontend lint may be configured; allow optional lint failures to be strict if desired
          npm run lint || true
          npm run build

      - name: Install & Test Simulator
        working-directory: ./simulator
        run: |
          npm install
          if npm run lint --silent; then echo "simulator lint OK"; else echo "simulator lint failed"; exit 1; fi
          npm test

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker buildx build --load -t supplychainpro-backend:ci ./backend

      - name: Build simulator image
        run: docker buildx build --load -t supplychainpro-simulator:ci ./simulator

      - name: Build frontend image
        run: docker buildx build --load -t supplychainpro-frontend:ci ./frontend

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=supplychain_db
          DB_USER=supplychain_user
          DB_PASSWORD=supplychain_pass
          DB_ROOT_PASSWORD=supplychain_root_pass
          PORT=5000
          JWT_SECRET=ci_test_secret_do_not_use_in_prod
          BACKEND_URL=http://localhost:5000
          NODE_ENV=test
          ADMIN_EMAIL=admin@test.local
          ADMIN_PASSWORD=admin123
          SIM_STATE_PATH=/data
          SIMULATOR_URL=http://localhost:5002
          EOF

      - name: Validate docker-compose file
        run: docker compose config
